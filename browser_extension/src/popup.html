<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SPL Validator</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 10px; width: 420px; }
      textarea { width: 100%; height: 140px; font-family: ui-monospace, monospace; font-size: 12px; }
      pre { white-space: pre-wrap; word-break: break-word; font-size: 11px; max-height: 220px; overflow: auto; background: #111; color: #eee; padding: 8px; border-radius: 6px; }
      button { margin-top: 8px; padding: 6px 10px; }
      .row { margin-top: 6px; }
      a { font-size: 12px; }
    </style>
  </head>
  <body>
    <div><strong>SPL</strong> (validated against local API)</div>
    <textarea id="spl" placeholder="index=web | stats count BY host"></textarea>
    <div class="row">
      <button id="go" type="button">Validate</button>
      <a href="options.html" target="_blank">Options</a>
    </div>
    <pre id="out">{}</pre>
    <script src="popup.js"></script>
  </body>
</html>
