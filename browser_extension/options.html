<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SPL Validator options</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 16px; max-width: 520px; }
      label { display: block; margin-top: 10px; font-weight: 600; }
      input { width: 100%; padding: 6px; margin-top: 4px; }
      p { font-size: 13px; color: #444; }
    </style>
  </head>
  <body>
    <h3>SPL Validator (local API)</h3>
    <p>
      Point this extension at the URL where <code>spl-validator-httpd</code> is listening (no trailing slash).
      Start the server from the repo: <code>spl-validator-httpd --host 127.0.0.1 --port 8765</code>
    </p>
    <label for="apiBase">API base URL</label>
    <input id="apiBase" type="text" autocomplete="off" />
    <script src="options.js"></script>
  </body>
</html>
