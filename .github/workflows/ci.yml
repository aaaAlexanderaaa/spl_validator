name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (editable + dev extras)
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: typescript
        run: npm install

      - name: Build core
        working-directory: typescript
        run: npm run build -w @spl-validator/core

      - name: Test core
        working-directory: typescript
        run: npm run test -w @spl-validator/core

      - name: Build runtime + extension
        working-directory: typescript
        run: npm run build -w @spl-validator/runtime && npm run build -w @spl-validator/extension
