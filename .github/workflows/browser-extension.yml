name: browser-extension

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: browser_extension/package-lock.json

      - name: Install Python package (httpd for e2e)
        run: pip install -e .

      - name: Install extension dependencies
        working-directory: browser_extension
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: browser_extension
        run: npx playwright install chromium

      - name: Unit + dist checks
        working-directory: browser_extension
        run: npm run test

      - name: E2E (xvfb)
        working-directory: browser_extension
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          xvfb-run -a npm run test:e2e
